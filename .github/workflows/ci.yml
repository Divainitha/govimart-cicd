name: CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        run: |
          az acr login --name acrgovimartdev001

      - name: Build Docker Image
        run: |
          docker build -t acrgovimartdev001.azurecr.io/govimart-backend:v2 .

      - name: Push Docker Image
        run: |
          docker push acrgovimartdev001.azurecr.io/govimart-backend:v2